<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Summary - Donmac Data Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Donmac Data Hub</h1>

    <p class="tagline">
      ✅ Thank you for making an order, your data is being processed.
    </p>

    <div id="orderDetails" class="order-box"></div>

    <button onclick="downloadOrder()">Download Order (PDF)</button>

    <a href="index.html">
      <button>Make Another Order</button>
    </a>
  </div>

  <!-- jsPDF library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script>
    const order = JSON.parse(localStorage.getItem("donmac_order"));
    const orderBox = document.getElementById("orderDetails");

    if (!order) {
      orderBox.innerHTML = `
        <p style="color:red;">
          ❌ No order details found.<br>
          Please contact Donmac Data Hub with your Paystack receipt.
        </p>
      `;
    } else {
      orderBox.innerHTML = `
        <p><strong>Network:</strong> ${order.network}</p>
        <p><strong>Data Bundle:</strong> ${order.bundle}</p>
        <p><strong>Amount Paid:</strong> ¢${order.amount}</p>
        <p><strong>Number to Receive Data:</strong> ${order.recipient}</p>
        <p><strong>Payment Method:</strong> ${order.paymentMethod}</p>
        <p><strong>Reference:</strong> ${order.reference}</p>
        <p><strong>Date:</strong> ${order.date}</p>
      `;
    }

    function downloadOrder() {
      if (!order) return;

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      doc.setFontSize(16);
      doc.text("Donmac Data Hub", 20, 20);

      doc.setFontSize(12);
      doc.text("Order Summary", 20, 30);

      let y = 45;
      doc.text(`Network: ${order.network}`, 20, y); y += 8;
      doc.text(`Data Bundle: ${order.bundle}`, 20, y); y += 8;
      doc.text(`Amount Paid: ¢${order.amount}`, 20, y); y += 8;
      doc.text(`Number to Receive Data: ${order.recipient}`, 20, y); y += 8;
      doc.text(`Payment Method: ${order.paymentMethod}`, 20, y); y += 8;
      doc.text(`Reference: ${order.reference}`, 20, y); y += 8;
      doc.text(`Date: ${order.date}`, 20, y);

      doc.save(`Donmac_Order_${order.reference}.pdf`);
    }
  </script>

</body>
</html>
